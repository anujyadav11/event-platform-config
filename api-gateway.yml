server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:lb://AUTH-SERVICE}
              predicates:
                - Path=/auth/**

            - id: order-service
              uri: ${ORDER_SERVICE_URL:lb://ORDER-SERVICE}
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1

            - id: inventory-service
              uri: ${INVENTORY_SERVICE_URL:lb://INVENTORY-SERVICE}
              predicates:
                - Path=/api/v1/inventory/**

            - id: pricing-service
              uri: ${PRICING_SERVICE_URL:lb://PRICING-SERVICE}
              predicates:
                - Path=/api/pricing/**

            - id: delivery-service
              uri: ${DELIVERY_SERVICE_URL:lb://DELIVERY-SERVICE}
              predicates:
                - Path=/api/v1/deliveries/**

            - id: websocket-service
              uri: ${WEBSOCKET_SERVICE_URL:lb://WEBSOCKET-SERVICE}
              predicates:
                - Path=/ws/**

            - id: auth-service-openapi
              uri: ${AUTH_SERVICE_URL:lb://AUTH-SERVICE}
              predicates:
                - Path=/auth-service/v3/api-docs,/auth-service/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: order-service-openapi
              uri: ${ORDER_SERVICE_URL:lb://ORDER-SERVICE}
              predicates:
                - Path=/order-service/v3/api-docs,/order-service/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: inventory-service-openapi
              uri: ${INVENTORY_SERVICE_URL:lb://INVENTORY-SERVICE}
              predicates:
                - Path=/inventory-service/v3/api-docs,/inventory-service/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: pricing-service-openapi
              uri: ${PRICING_SERVICE_URL:lb://PRICING-SERVICE}
              predicates:
                - Path=/pricing-service/v3/api-docs,/pricing-service/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: delivery-service-openapi
              uri: ${DELIVERY_SERVICE_URL:lb://DELIVERY-SERVICE}
              predicates:
                - Path=/delivery-service/v3/api-docs,/delivery-service/v3/api-docs/**
              filters:
                - StripPrefix=1

jwt:
  secret: ${JWT_SECRET}

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    persist-authorization: true
    operations-sorter: method
    tags-sorter: alpha
    urls:
      - name: Auth Service
        url: /auth-service/v3/api-docs
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Inventory Service
        url: /inventory-service/v3/api-docs
      - name: Pricing Service
        url: /pricing-service/v3/api-docs
      - name: Delivery Service
        url: /delivery-service/v3/api-docs
