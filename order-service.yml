server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: order-service

  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/orders}
    username: ${ORDER_DB_USERNAME:postgres}
    password: ${ORDER_DB_PASSWORD:postgres}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.eventstream.common

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      pricingService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:
      pricingService:
        maxAttempts: 3
        waitDuration: 2s

  timelimiter:
    instances:
      pricingService:
        timeoutDuration: 3s

pricing-service:
  base-url: ${PRICING_SERVICE_URL:http://pricing-service-spring-boot-app:8089}

logging:
  level:
    root: INFO
    com.example.eventstream.order: DEBUG

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  health:
    circuitbreakers:
      enabled: true
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}